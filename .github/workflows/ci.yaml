name: CI pipeline

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    env:
      API_URL: 'http://localhost:3001'
      AUTH_SECRET: 'dummy-secret-for-testing-purposes'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node js envt
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install dependencies
        run: yarn install --frozen-lockfile

      - name: run lint
        run: yarn lint

      - name: run tests
        run: yarn test
        env:
          API_URL: 'http://localhost:3001'
          # You also need to provide an AUTH_SECRET for NextAuth
          AUTH_SECRET: 'dummy-secret-for-testing-purposes'

      - name: build project
        run: yarn build
