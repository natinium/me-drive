name: CI Pipeline

on:
  push:
    branches:
      - dev
  
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Lint
        run: yarn lint

      - name: ❗️ DEBUG - Verify Environment Variables
        run: |
          echo "--- Verifying environment variables ---"
          if [ -z "$API_URL" ]; then
            echo "❌ API_URL is NOT SET"
            exit 1
          else
            echo "✅ API_URL is set to: $API_URL"
          fi

      - name: Run Tests (which includes the build)
        run: yarn test
